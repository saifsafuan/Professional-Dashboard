<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pembina Dashboard — Bina dashboard anda sendiri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<!-- Leaflet: peta web interaktif (sumber terbuka, tanpa kunci API) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js" defer></script>
<style>
:root{
  --bg:#F6F7F9; --panel:#FFFFFF; --canvas:#F1F3F6;
  --line:#E7E9EE; --line-2:#D9DCE3; --line-3:#CDD1DA;
  --ink:#161A20; --ink-2:#5A626E; --ink-3:#9097A2; --ink-4:#B6BcC6;
  --accent:#4355E0; --accent-ink:#FFFFFF; --accent-soft:#ECEEFC;
  --good:#2F9E44; --good-soft:#EAF6EC; --bad:#E03131; --bad-soft:#FBEAEA;
  --warn:#E8590C;
  --display:'Manrope',system-ui,sans-serif;
  --ui:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --r:14px; --r-sm:9px;
  --sh:0 1px 2px rgba(22,26,32,.04), 0 2px 8px rgba(22,26,32,.05);
  --sh-pop:0 8px 30px rgba(22,26,32,.13), 0 2px 6px rgba(22,26,32,.08);
  --tb-h:58px; --pal-w:228px; --insp-w:312px;
}
:root.dark{
  --bg:#0E1116; --panel:#171B22; --canvas:#0A0D12;
  --line:#262B34; --line-2:#323844; --line-3:#434B59;
  --ink:#E8EBF0; --ink-2:#AEB6C2; --ink-3:#7E8794; --ink-4:#59616E;
  --good:#37B24D; --good-soft:#15291B; --bad:#FF6B6B; --bad-soft:#2C1718;
  --warn:#F59F00;
  --sh:0 1px 2px rgba(0,0,0,.3), 0 2px 8px rgba(0,0,0,.35);
  --sh-pop:0 10px 34px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.4);
}
:root.dark .map-host{filter:none}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}
svg{display:block}
.muted{color:var(--ink-3)}

/* ============ App shell ============ */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{height:var(--tb-h);flex:none;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line);position:relative;z-index:40}
.body{flex:1;display:flex;min-height:0;position:relative}

/* Brand */
.brand{display:flex;align-items:center;gap:9px;padding-right:6px}
.brand .mk{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex:none}
.brand .mk svg{width:17px;height:17px;stroke:#fff;stroke-width:2.2;fill:none}
.brand .nm{font-family:var(--display);font-weight:800;font-size:15.5px;letter-spacing:-.02em;white-space:nowrap}
.tb-div{width:1px;height:26px;background:var(--line);flex:none}

/* Dashboard switcher trigger */
.dash-trig{display:flex;align-items:center;gap:8px;background:none;border:1px solid transparent;border-radius:9px;padding:6px 9px;max-width:260px}
.dash-trig:hover{background:var(--bg);border-color:var(--line)}
.dash-trig .dt-nm{font-family:var(--display);font-weight:700;font-size:14.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.dash-trig .car{color:var(--ink-3);flex:none}
.tb-spacer{flex:1}

/* Generic toolbar buttons */
.tbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-2);background:var(--panel);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;color:var(--ink-2);white-space:nowrap}
.tbtn:hover{border-color:var(--line-3);color:var(--ink);background:var(--bg)}
.tbtn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.9;fill:none}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.tbtn.primary:hover{background:var(--accent);filter:brightness(.94)}
.tbtn .only-wide{display:inline}
.tbtn.icon{padding:7px;width:34px;height:34px;justify-content:center}
#themeBtn .ic-moon{display:none}
:root.dark #themeBtn .ic-sun{display:none}
:root.dark #themeBtn .ic-moon{display:block}
.tbtn:disabled{opacity:.38;cursor:default;background:var(--panel);border-color:var(--line-2);color:var(--ink-3)}
.tbtn:disabled:hover{background:var(--panel);border-color:var(--line-2);color:var(--ink-3)}

/* Mode segmented */
.seg{display:flex;background:var(--bg);border:1px solid var(--line-2);border-radius:9px;padding:3px;gap:3px}
.seg button{border:0;background:none;border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}
.seg button svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.seg button.on{background:var(--panel);color:var(--ink);box-shadow:var(--sh)}

/* Accent dot trigger */
.acc-trig{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:var(--panel);display:grid;place-items:center}
.acc-trig:hover{border-color:var(--line-3)}
.acc-trig .dot{width:15px;height:15px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--panel),0 0 0 3px var(--line-2)}

/* Save status */
.save-ind{font-size:12px;color:var(--ink-3);display:inline-flex;align-items:center;gap:6px;padding:0 2px;white-space:nowrap}
.save-ind .pip{width:7px;height:7px;border-radius:50%;background:var(--good)}
.save-ind.saving .pip{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}

/* ============ Popovers / menus ============ */
.menu{position:absolute;top:calc(var(--tb-h) - 6px);background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-pop);padding:6px;min-width:230px;z-index:60;display:none}
.menu.open{display:block}
.menu .mi{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;border-radius:8px;padding:9px 10px;font-size:13px;font-weight:500;color:var(--ink)}
.menu .mi:hover{background:var(--bg)}
.menu .mi svg{width:15px;height:15px;stroke:var(--ink-3);stroke-width:1.9;fill:none;flex:none}
.menu .mi.danger{color:var(--bad)} .menu .mi.danger svg{stroke:var(--bad)}
.menu .mi .ck{margin-left:auto;color:var(--accent)}
.menu .sep{height:1px;background:var(--line);margin:6px 4px}
.menu .mlabel{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);padding:8px 10px 4px}
.menu .dash-row{display:flex;align-items:center;gap:8px}
.menu .dash-row .pick{flex:1;text-align:left;border:0;background:none;border-radius:8px;padding:9px 10px;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu .dash-row .pick:hover{background:var(--bg)}
.menu .dash-row .pick.act{color:var(--accent);font-weight:700}
.accgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px}
.accgrid button{height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;position:relative}
.accgrid button.on{border-color:var(--ink)}
.accgrid button .chk{position:absolute;inset:0;display:grid;place-items:center;color:#fff}
.accgrid button .chk svg{width:14px;height:14px;stroke:#fff;stroke-width:2.6;fill:none}

/* ============ Palette ============ */
.palette{width:var(--pal-w);flex:none;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px 24px}
.pal-h{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);margin:6px 4px 9px}
.pal-h:not(:first-child){margin-top:20px}
.pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pal-item{display:flex;flex-direction:column;gap:7px;align-items:flex-start;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 10px;transition:.12s}
.pal-item:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
.pal-item .ic{width:30px;height:30px;border-radius:8px;background:var(--bg);display:grid;place-items:center;border:1px solid var(--line)}
.pal-item:hover .ic{background:#fff;border-color:transparent}
.pal-item .ic svg{width:17px;height:17px;stroke:var(--accent);stroke-width:1.9;fill:none}
.pal-item .nm{font-size:12px;font-weight:600;color:var(--ink);line-height:1.2}
.pal-item .ds{font-size:10.5px;color:var(--ink-3);line-height:1.3}
.tpl-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin-bottom:7px}
.tpl-item:hover{border-color:var(--accent);background:var(--accent-soft)}
.tpl-item .ti{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;flex:none;color:#fff}
.tpl-item .ti svg{width:15px;height:15px;stroke:#fff;stroke-width:2;fill:none}
.tpl-item .tn{font-size:12.5px;font-weight:600}
.tpl-item .td{font-size:10.5px;color:var(--ink-3)}

/* ============ Canvas ============ */
.canvas{flex:1;background:var(--canvas);overflow:auto;position:relative}
.cv-pad{padding:22px;min-height:100%}
.cv-inner{position:relative;max-width:1280px;margin:0 auto}
.app.preview .cv-inner{max-width:1180px}

.widget{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.app:not(.preview) .widget:hover{border-color:var(--line-3)}
.widget.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),0 0 0 3px var(--accent),var(--sh)}
.widget.dragging{opacity:.92;box-shadow:var(--sh-pop);z-index:30;transition:none;cursor:grabbing}
.widget.resizing{transition:none;z-index:30}
.w-head{display:flex;align-items:center;gap:8px;padding:11px 12px 8px;flex:none}
.app:not(.preview) .w-head{cursor:grab}
.app:not(.preview) .w-head:active{cursor:grabbing}
.w-title{font-family:var(--display);font-weight:700;font-size:13.5px;letter-spacing:-.01em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.w-actions{display:flex;gap:2px;flex:none}
.app.preview .w-actions{display:none}
.w-actions button{width:26px;height:26px;border-radius:7px;border:0;background:none;color:var(--ink-3);display:grid;place-items:center}
.w-actions button:hover{background:var(--bg);color:var(--ink)}
.w-actions button.del:hover{background:var(--bad-soft);color:var(--bad)}
.w-actions .lk.on{color:var(--accent)}
.widget.locked .w-head,.app:not(.preview) .widget.locked[data-type="text"]{cursor:default}
.w-actions button svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.9;fill:none}
.w-body{flex:1;min-height:0;padding:4px 12px 13px;position:relative;container-type:size}
/* teks & imej: tinggi boleh 'auto', jadi jangan guna size-containment (elak runtuh) */
.widget[data-type="text"] .w-body,.widget[data-type="image"] .w-body{container-type:normal}
.w-resize{position:absolute;right:3px;bottom:3px;width:16px;height:16px;cursor:nwse-resize;z-index:5;border-radius:3px}
.app.preview .w-resize{display:none}
.w-resize::after{content:"";position:absolute;right:3px;bottom:3px;width:7px;height:7px;border-right:2px solid var(--line-3);border-bottom:2px solid var(--line-3);border-radius:0 0 2px 0}
.widget:hover .w-resize::after{border-color:var(--ink-3)}

.placeholder{position:absolute;border:2px dashed var(--accent);background:var(--accent-soft);border-radius:var(--r);z-index:20;pointer-events:none;opacity:.7}

/* Empty state */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-3);padding:30px;pointer-events:none}
.empty .eic{width:58px;height:58px;border-radius:16px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;margin-bottom:16px;box-shadow:var(--sh)}
.empty .eic svg{width:28px;height:28px;stroke:var(--accent);stroke-width:1.7;fill:none}
.empty h2{font-family:var(--display);font-weight:700;font-size:18px;color:var(--ink);margin:0 0 6px;letter-spacing:-.02em}
.empty p{font-size:13px;max-width:330px;margin:0;line-height:1.55}
.empty .keys{margin-top:16px;display:flex;gap:14px;font-size:11.5px;color:var(--ink-4)}
.empty .keys b{color:var(--ink-2);font-weight:600}

/* ===== Widget content ===== */
.kpi{height:100%;display:flex;flex-direction:column;justify-content:center}
.kpi .kl{font-size:12px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
.kpi .kv{font-family:var(--mono);font-weight:700;font-size:clamp(22px,22cqmin,58px);letter-spacing:-.02em;margin-top:8px;line-height:1;color:var(--ink);display:flex;align-items:baseline;gap:2px;flex-wrap:wrap}
.kpi .kv .afx{font-size:clamp(12px,11cqmin,30px);color:var(--ink-3);font-weight:600}
.kpi .kd{margin-top:9px;display:inline-flex;align-items:center;gap:6px;font-size:clamp(11px,9cqmin,18px);font-weight:600}
.kpi .kd .chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:30px;font-family:var(--mono)}
.kpi .kd.up .chip{background:var(--good-soft);color:var(--good)}
.kpi .kd.down .chip{background:var(--bad-soft);color:var(--bad)}
.kpi .kd .cap{color:var(--ink-3);font-weight:500;font-family:var(--ui)}
.kpi.has-spark{justify-content:flex-start;padding-top:2px}
.kpi-spark{margin-top:auto;padding-top:10px}
.kpi-spark .spark{width:100%;height:34px;display:block;overflow:visible}
/* Bar kemajuan (progress / bullet) */
.prog{height:100%;display:flex;flex-direction:column;justify-content:center}
.prog-val{font-family:var(--mono);font-weight:700;font-size:clamp(20px,13cqmin,48px);letter-spacing:-.02em;color:var(--ink);margin:0 0 12px;line-height:1;display:flex;align-items:baseline;gap:9px}
.prog-pct{font-family:var(--mono);font-weight:700;font-size:clamp(12px,7cqmin,22px)}
.prog-track{position:relative;height:12px;background:var(--bg);border:1px solid var(--line);border-radius:30px;overflow:hidden}
.prog-fill{position:absolute;left:0;top:0;bottom:0;border-radius:30px;transition:width .5s cubic-bezier(.2,.7,.3,1);min-width:4px}
.prog-tmark{position:absolute;top:-3px;bottom:-3px;width:3px;border-radius:2px;background:var(--ink);transform:translateX(-1.5px);box-shadow:0 0 0 1.5px var(--panel)}
.prog-foot{display:flex;justify-content:space-between;gap:8px;margin-top:7px;font-family:var(--mono);font-size:10.5px;color:var(--ink-4)}
.prog-foot span{white-space:nowrap}
.chart-host{position:absolute;inset:4px 12px 13px}
.widget[data-type="donut"] .chart-host{inset:3px 8px 8px}
.map-host{position:absolute;inset:4px 12px 13px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--bg)}
.map-host .leaflet-container{width:100%;height:100%;background:var(--bg);font-family:var(--ui)}
.map-host .leaflet-control-attribution{font-size:9px;background:rgba(255,255,255,.7)}
.map-host .leaflet-popup-content{font-family:var(--ui);font-size:12.5px;margin:9px 12px;line-height:1.4}
.map-host .leaflet-popup-content b{font-family:var(--display);font-weight:700}
.map-host .leaflet-popup-content .mv{font-family:var(--mono);font-weight:700;color:var(--accent)}
.map-host .leaflet-popup-content-wrapper{border-radius:9px;box-shadow:var(--sh-pop)}
.map-pin{display:grid;place-items:center}
.map-pin svg{width:26px;height:26px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.map-tip{background:var(--panel);border:1px solid var(--line-2);color:var(--ink);font-family:var(--ui);font-size:11px;font-weight:600;padding:2px 6px;border-radius:6px;box-shadow:var(--sh);white-space:nowrap}
.map-empty{position:absolute;inset:4px 12px 13px;display:flex;flex-direction:column;gap:7px;align-items:center;justify-content:center;border:1.5px dashed var(--line-3);border-radius:10px;color:var(--ink-4);text-align:center;padding:12px}
.map-empty svg{width:30px;height:30px;stroke:var(--ink-4);stroke-width:1.6;fill:none}
.map-empty .mh{font-size:12px;font-weight:600;color:var(--ink-3)}
.map-empty .ms{font-size:11px;line-height:1.4;max-width:220px}
/* penanda buih (divIcon) + denyut + label nilai */
.mbub-wrap,.map-pin{background:transparent;border:0}
.mbub{border-radius:50%;background:var(--mc,#4355E0);opacity:.85;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;position:relative}
.mbub .mbv{font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);white-space:nowrap;line-height:1}
.mbub.pulse::before{content:"";position:absolute;inset:-2px;border-radius:50%;border:2px solid var(--mc,#4355E0);animation:mpulse 1.9s ease-out infinite;pointer-events:none}
.map-pin .ppz{position:absolute;left:50%;bottom:2px;width:18px;height:18px;margin-left:-9px;border-radius:50%;border:2px solid var(--pc,#4355E0);animation:mpulse 1.9s ease-out infinite;pointer-events:none}
@keyframes mpulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.6);opacity:0}}
.map-host .leaflet-tooltip.map-vlab{background:rgba(255,255,255,.92);border:1px solid var(--line-2);color:var(--ink);font-family:var(--mono);font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:6px;box-shadow:var(--sh)}
/* legenda peta */
.map-legend{position:absolute;left:10px;bottom:12px;z-index:650;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:10px;padding:9px 11px;box-shadow:var(--sh);font-size:11px;color:var(--ink-2);max-width:170px}
.map-legend .lg-t{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-bottom:6px}
.map-legend .lg-bar{height:9px;border-radius:5px;margin-bottom:4px}
.map-legend .lg-ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-3)}
.map-legend .lg-sz{display:flex;align-items:center;gap:9px;margin-top:3px}
.map-legend .lg-sz .lg-dot{border-radius:50%;background:var(--accent);opacity:.8;flex:none}
.map-legend .lg-row{display:flex;align-items:center;gap:7px;margin-top:4px}
.map-legend .lg-row .lg-c{width:11px;height:11px;border-radius:50%;flex:none}
.gauge-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.gauge-wrap svg{width:100%;max-width:min(320px,86cqh)}
.gauge-val{font-family:var(--mono);font-weight:700;font-size:clamp(18px,19cqmin,46px);letter-spacing:-.02em;margin-top:-1em}
.gauge-val .gsuf{font-size:.6em;color:var(--ink-3)}
.gauge-lab{font-size:clamp(10px,9cqmin,18px);color:var(--ink-3);font-weight:600;margin-top:2px}
.gauge-ends{width:100%;max-width:min(320px,86cqh);display:flex;justify-content:space-between;font-family:var(--mono);font-size:clamp(9px,7cqmin,14px);color:var(--ink-4);margin-top:2px}
.wtable-scroll{position:absolute;inset:4px 12px 13px;overflow:auto}
table.wtable{width:100%;border-collapse:collapse;font-size:clamp(11px,3.4cqmin,17px)}
table.wtable th{font-family:var(--display);font-weight:700;font-size:clamp(10px,2.9cqmin,14px);text-transform:uppercase;letter-spacing:.03em;text-align:left;padding:8px 10px;color:var(--ink-2);border-bottom:1px solid var(--line-2);position:sticky;top:0;background:var(--panel)}
table.wtable.acc th{background:var(--accent);color:#fff;border-bottom:0}
table.wtable td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--ink)}
table.wtable td.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums}
table.wtable.striped tbody tr:nth-child(even){background:var(--bg)}
table.wtable tbody tr:last-child td{border-bottom:0}
.wtext{height:100%;display:flex;flex-direction:column;justify-content:center}
.wtext.al-center{text-align:center;align-items:center}
.wtext .th{font-family:var(--display);letter-spacing:-.02em;color:var(--ink);line-height:1.15}
.wtext.sz-h .th{font-size:21px;font-weight:800}
.wtext.sz-s .th{font-size:15px;font-weight:700}
.wtext.sz-n .th{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)}
.wtext .tb{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.5;white-space:pre-wrap;max-width:62ch}
.wtext.al-center .tb{margin-left:auto;margin-right:auto}

/* ============ Inspector ============ */
.inspector{width:var(--insp-w);flex:none;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
.app.preview .palette,.app.preview .inspector{display:none}
.insp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-3);padding:30px;gap:12px}
.insp-empty .ie{width:46px;height:46px;border-radius:12px;background:var(--bg);display:grid;place-items:center;border:1px solid var(--line)}
.insp-empty .ie svg{width:22px;height:22px;stroke:var(--ink-4);stroke-width:1.7;fill:none}
.insp-empty p{font-size:12.5px;max-width:210px;line-height:1.5;margin:0}
.insp-head{display:flex;align-items:center;gap:9px;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
.insp-head .ih-ic{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);display:grid;place-items:center;flex:none}
.insp-head .ih-ic svg{width:16px;height:16px;stroke:var(--accent);stroke-width:1.9;fill:none}
.insp-head .ih-t{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:-.01em}
.insp-head .ih-s{font-size:11px;color:var(--ink-3)}
.insp-body{padding:6px 16px 90px}
.grp{padding:14px 0;border-bottom:1px solid var(--line)}
.grp:last-child{border-bottom:0}
.grp-t{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);margin:0 0 11px}
.fld{margin-bottom:11px}
.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
.fld input[type=text],.fld input[type=number],.fld textarea,.fld select{width:100%;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--panel);transition:.12s}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-soft)}
.fld textarea{resize:vertical;min-height:70px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.stepper{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:8px;overflow:hidden}
.stepper button{width:32px;height:34px;border:0;background:var(--bg);color:var(--ink-2);font-size:16px;font-weight:600}
.stepper button:hover{background:var(--line);color:var(--ink)}
.stepper .val{flex:1;text-align:center;font-family:var(--mono);font-weight:600;font-size:13px}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 0}
.toggle .tl{font-size:12.5px;font-weight:500;color:var(--ink)}
.sw{width:38px;height:22px;border-radius:30px;background:var(--line-2);border:0;position:relative;transition:.16s;flex:none}
.sw.on{background:var(--accent)}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.16s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on::after{transform:translateX(16px)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip-btn{border:1px solid var(--line-2);background:var(--panel);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;color:var(--ink-2)}
.chip-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip-btn:not(.on):hover{border-color:var(--line-3);color:var(--ink)}

/* mini data editors */
.deditor{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.deditor .dh{display:flex;gap:6px;padding:8px 8px;background:var(--bg);border-bottom:1px solid var(--line);align-items:center}
.deditor .lbl-h{flex:none;width:62px;font-size:10.5px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.04em;padding-left:2px}
.ser-h{flex:1;display:flex;align-items:center;gap:5px;min-width:0}
.ser-h .cdot{width:14px;height:14px;border-radius:4px;flex:none;cursor:pointer;border:1px solid rgba(0,0,0,.12)}
.ser-h input{flex:1;min-width:0;border:1px solid transparent;background:transparent;border-radius:6px;padding:4px 5px;font-size:11.5px;font-weight:600}
.ser-h input:hover{background:var(--panel)} .ser-h input:focus{background:var(--panel);border-color:var(--accent)}
.ser-h .xs{width:18px;height:18px;border:0;background:none;color:var(--ink-4);border-radius:5px;flex:none}
.ser-h .xs:hover{background:var(--bad-soft);color:var(--bad)}
.drow{display:flex;gap:6px;padding:6px 8px;align-items:center;border-bottom:1px solid var(--line)}
.drow:last-of-type{border-bottom:0}
.drow .rl{flex:none;width:62px}
.drow .cell{flex:1;min-width:0}
.drow input{width:100%;border:1px solid var(--line-2);border-radius:6px;padding:5px 7px;font-size:12px}
.drow input.numi{font-family:var(--mono);text-align:right}
.drow .cdot{width:14px;height:14px;border-radius:4px;flex:none;cursor:pointer;border:1px solid rgba(0,0,0,.12)}
.drow .xr{width:24px;height:24px;border:0;background:none;color:var(--ink-4);border-radius:6px;flex:none;display:grid;place-items:center}
.drow .xr:hover{background:var(--bad-soft);color:var(--bad)}
.drow .xr svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.dadd{display:flex;gap:7px;padding:8px}
.dadd button{flex:1;border:1px dashed var(--line-3);background:var(--bg);border-radius:8px;padding:7px;font-size:11.5px;font-weight:600;color:var(--ink-2)}
.dadd button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

.del-w-btn{width:100%;margin-top:6px;border:1px solid var(--bad-soft);background:var(--bad-soft);color:var(--bad);border-radius:9px;padding:10px;font-size:13px;font-weight:600}
.del-w-btn:hover{background:var(--bad);color:#fff;border-color:var(--bad)}
.dup-w-btn{width:100%;border:1px solid var(--line-2);background:var(--panel);border-radius:9px;padding:10px;font-size:13px;font-weight:600;color:var(--ink-2)}
.dup-w-btn:hover{border-color:var(--line-3);color:var(--ink);background:var(--bg)}
/* Sumber data langsung */
.src-actions{display:flex;gap:7px;margin-top:4px}
.src-fetch{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:9px;font-size:12.5px;font-weight:600}
.src-fetch:hover{filter:brightness(.95)}
.src-fetch svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.src-clear{border:1px solid var(--line-2);background:var(--panel);color:var(--ink-3);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600}
.src-clear:hover{border-color:var(--bad-soft);color:var(--bad);background:var(--bad-soft)}
.src-status{font-size:11.5px;font-weight:600;margin-top:9px}
.src-status .src-ok{color:var(--good)} .src-status .src-err{color:var(--bad)}
.src-hint{font-size:10.5px;color:var(--ink-4);line-height:1.45;margin-top:8px}

/* Offline banner */
.offbar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#3A2A12;color:#FFE2BD;padding:9px 16px;border-radius:30px;font-size:12px;z-index:120;box-shadow:var(--sh-pop);display:none}
.offbar.show{display:block}

/* Toast */
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(16px);background:#252B34;color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:.22s;z-index:200;box-shadow:var(--sh-pop);max-width:90vw;text-align:center}
:root.dark .toast{background:#2C333D;border:1px solid var(--line-2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ============ Images, icons, CSV import ============ */
.img-host{position:absolute;inset:6px 12px 12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:8px;background:var(--bg)}
.img-host.has-cap{inset:6px 12px 30px}
.img-host img{width:100%;height:100%;display:block}
.img-cap{position:absolute;left:12px;right:12px;bottom:9px;text-align:center;font-size:11.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-empty{position:absolute;inset:6px 12px 13px;display:flex;flex-direction:column;gap:7px;align-items:center;justify-content:center;border:1.5px dashed var(--line-3);border-radius:10px;color:var(--ink-4);text-align:center;padding:12px}
.img-empty svg{width:30px;height:30px;stroke:var(--ink-4);stroke-width:1.6;fill:none}
.img-empty .ih{font-size:12px;font-weight:600;color:var(--ink-3)}
.img-empty .is{font-size:11px;line-height:1.4;max-width:200px}
.kpi-icon{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:10px;background:var(--accent-soft);display:grid;place-items:center;overflow:hidden}
.kpi-icon img{width:100%;height:100%;object-fit:contain;padding:7px}
.wtext .th-row{display:flex;align-items:center;gap:11px}
.wtext.al-center .th-row{justify-content:center}
.wtext .ticon{width:32px;height:32px;border-radius:8px;object-fit:contain;flex:none;background:var(--accent-soft);padding:5px}
.imgctl{display:flex;gap:11px;align-items:center}
.imgprev{width:52px;height:52px;border-radius:9px;border:1px solid var(--line-2);background:var(--bg);display:grid;place-items:center;overflow:hidden;flex:none}
.imgprev img{width:100%;height:100%;object-fit:contain}
.imgprev.empty svg{width:20px;height:20px;stroke:var(--ink-4);stroke-width:1.7;fill:none}
.imgbtns{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
.imgup-btn{border:1px solid var(--line-2);background:var(--panel);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;color:var(--ink-2)}
.imgup-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.imgdel-btn{border:1px solid var(--line);background:none;border-radius:8px;padding:6px 10px;font-size:11.5px;font-weight:600;color:var(--ink-3)}
.imgdel-btn:hover{color:var(--bad);border-color:var(--bad-soft);background:var(--bad-soft)}
.ed-actions{display:flex;gap:7px;margin-bottom:9px}
.ed-imp{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line-2);background:var(--panel);border-radius:8px;padding:9px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
.ed-imp:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.ed-imp svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.9;fill:none}

/* ============ Responsive ============ */
.mobtabs{display:none}
@media (max-width:920px){
  :root{--insp-w:280px;--pal-w:200px}
  .tbtn .only-wide{display:none}
}
@media (max-width:720px){
  body{overflow:auto}
  .app{height:auto;min-height:100dvh}
  .topbar{flex-wrap:wrap;height:auto;padding:9px 12px;gap:8px}
  .tb-spacer{display:none}
  .brand .nm{font-size:14px}
  .seg button{padding:6px 10px}
  .body{flex-direction:column}
  .palette,.inspector{position:fixed;top:0;bottom:0;z-index:90;width:84vw;max-width:330px;box-shadow:var(--sh-pop);transition:transform .22s}
  .palette{left:0;transform:translateX(-102%)}
  .inspector{right:0;transform:translateX(102%);border-left:1px solid var(--line);border-right:0}
  .app.show-pal .palette{transform:translateX(0)}
  .app.show-insp .inspector{transform:translateX(0)}
  .scrim{position:fixed;inset:0;background:rgba(16,20,26,.4);z-index:85;display:none}
  .app.show-pal .scrim,.app.show-insp .scrim{display:block}
  .canvas{overflow:visible}
  .cv-pad{padding:14px}
  /* widgets stack via JS (flow), but ensure full width */
  .mobtabs{display:flex;gap:8px;width:100%;order:5}
  .mobtabs button{flex:1;border:1px solid var(--line-2);background:var(--panel);border-radius:9px;padding:9px;font-size:12.5px;font-weight:600;color:var(--ink-2);display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .mobtabs button svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
  .app.preview .mobtabs{display:none}
  .insp-head{position:relative}
  .menu{position:fixed;top:auto;bottom:0;left:0;right:0;border-radius:16px 16px 0 0;min-width:0;max-height:70vh;overflow:auto}
  .accgrid{grid-template-columns:repeat(4,1fr)}
}

/* ============ Print ============ */
@media print{
  @page{margin:14mm}
  body{overflow:visible;background:#fff}
  .topbar,.palette,.inspector,.mobtabs,.scrim,.toast,.offbar,.w-resize,.w-actions,.empty .keys{display:none!important}
  .app,.body{display:block;height:auto}
  .canvas{overflow:visible;background:#fff}
  .cv-pad{padding:0}
  .cv-inner{max-width:100%}
  .widget{position:static!important;width:100%!important;height:auto!important;transform:none!important;box-shadow:none;border:1px solid #d8dce3;margin:0 0 14px;break-inside:avoid;page-break-inside:avoid}
  .chart-host,.wtable-scroll{position:static;inset:auto}
}

/* Widget teks: tiada bar kepala — tajuk rapat di atas-kiri, butang tindakan terapung */
.widget[data-type="text"] .w-body{padding:11px 14px 12px}
.widget[data-type="text"] > .w-actions{position:absolute;top:6px;right:6px;z-index:4;background:var(--panel);border-radius:8px;box-shadow:var(--sh)}
.app:not(.preview) .widget[data-type="text"]{cursor:grab}
.app:not(.preview) .widget[data-type="text"]:active{cursor:grabbing}


/* Eksport PDF satu halaman (imej tunggal, sama seperti PNG) */
#pdfPrint{display:none}
@media print{
  body.pdf-printing > *:not(#pdfPrint){display:none!important}
  body.pdf-printing #pdfPrint{display:block!important}
  body.pdf-printing #pdfPrint img{width:100%;height:auto;display:block}
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- ============ TOPBAR ============ -->
  <header class="topbar">
    <button class="tbtn" id="palBtn" style="display:none" data-m="togglePal" aria-label="Widget"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="brand">
      <div class="mk"><svg viewBox="0 0 24 24"><path d="M3 3h7v9H3zM14 3h7v5h-7zM14 12h7v9h-7zM3 16h7v5H3z"/></svg></div>
      <span class="nm">Pembina Dashboard</span>
    </div>
    <div class="tb-div"></div>
    <button class="dash-trig" data-m="toggleDash"><span class="dt-nm" id="dashName">Dashboard</span><svg class="car" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
    <div class="tb-div"></div>
    <button class="tbtn icon" id="undoBtn" data-m="undo" title="Buat asal (Ctrl+Z)" disabled><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12H8"/></svg></button>
    <button class="tbtn icon" id="redoBtn" data-m="redo" title="Buat semula (Ctrl+Y)" disabled><svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h6"/></svg></button>

    <div class="tb-spacer"></div>

    <div class="seg" id="modeSeg">
      <button data-m="mode" data-v="edit" class="on"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Sunting</button>
      <button data-m="mode" data-v="preview"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>Pratonton</button>
    </div>
    <button class="tbtn icon" id="themeBtn" data-m="toggleTheme" title="Tukar mod gelap/terang"><svg class="ic-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 1.5v3M12 19.5v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1.5 12h3M19.5 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg><svg class="ic-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
    <button class="acc-trig" data-m="toggleAcc" aria-label="Warna tema"><span class="dot"></span></button>
    <button class="tbtn" data-m="toggleExport"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span class="only-wide">Eksport</span></button>
    <button class="tbtn" id="inspBtn" style="display:none" data-m="toggleInsp" aria-label="Sifat"><svg viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg></button>

    <!-- menus -->
    <div class="menu" id="dashMenu" style="left:140px">
      <div class="mlabel">Dashboard anda</div>
      <div id="dashList"></div>
      <div class="sep"></div>
      <button class="mi" data-m="newDash"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Dashboard baharu</button>
      <button class="mi" data-m="renameDash"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Namakan semula</button>
      <button class="mi" data-m="dupDash"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>Gandakan</button>
      <button class="mi danger" data-m="delDash"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>Padam dashboard</button>
    </div>
    <div class="menu" id="accMenu" style="right:120px"><div class="mlabel">Warna tema</div><div class="accgrid" id="accGrid"></div></div>
    <div class="menu" id="exportMenu" style="right:60px">
      <div class="mlabel">Fail dashboard</div>
      <button class="mi" data-m="newFile"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 12v6M9 15h6"/></svg>Cipta dashboard baharu</button>
      <button class="mi" data-m="saveFile"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>Simpan ke fail (.json)</button>
      <button class="mi" data-m="openFile"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Muat naik dari fail (.json)</button>
      <div class="sep"></div>
      <div class="mlabel">Eksport visual</div>
      <button class="mi" data-m="exPrint"><svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>Cetak / Simpan PDF</button>
      <button class="mi" data-m="exPNG"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>Muat turun imej PNG</button>
    </div>

  try{
    if(hasStorage){ const r=await window.storage.get(KEY,false); return (r&&r.value!=null)?JSON.parse(r.value):null; }
    if(hasLocal){ const v=localStorage.getItem(KEY); return v!=null?JSON.parse(v):null; }
  }catch(e){ return null; }
  return (KEY in mem)?mem[KEY]:null;
}
let saveTimer=null;
function scheduleSave(){
  setSaving(true);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,450);
  scheduleHist();
}
async function doSave(){
  const payload={dashboards:state.dashboards,activeId:state.activeId,theme:state.theme};
  try{
    if(hasStorage){ await window.storage.set(KEY,JSON.stringify(payload),false); }
    else if(hasLocal){ localStorage.setItem(KEY,JSON.stringify(payload)); }
    else { mem[KEY]=payload; }
    setSaving(false,true);
  }catch(e){ setSaving(false,false); }
}
function setSaving(on,ok){
  const el=document.getElementById('saveInd'); if(!el) return;
  if(on){ el.classList.add('saving'); el.querySelector('.txt').textContent='Menyimpan…'; }
  else { el.classList.remove('saving'); el.querySelector('.txt').textContent= ok===false?'Sesi sahaja':'Tersimpan'; }
}

/* ===================== Undo / Redo (sejarah suntingan) ===================== */
const HIST_MAX=60;
let histPast=[], histFuture=[], histBase=null, histTimer=null;
function snap(){ return JSON.stringify({dashboards:state.dashboards,activeId:state.activeId},(k,v)=>k==='_mapWait'?undefined:v); }
function histInit(){ histPast=[]; histFuture=[]; histBase=snap(); updateUndoUI(); }
function scheduleHist(){
  clearTimeout(histTimer);
  histTimer=setTimeout(()=>{
    const cur=snap();
    if(cur===histBase) return;
    histPast.push(histBase); if(histPast.length>HIST_MAX) histPast.shift();
    histBase=cur; histFuture.length=0;
    updateUndoUI();
  },550);
}
function flushHist(){
  clearTimeout(histTimer);
  const cur=snap();
  if(cur!==histBase){ histPast.push(histBase); if(histPast.length>HIST_MAX) histPast.shift(); histBase=cur; histFuture.length=0; }
}
function applySnap(s){
  const o=JSON.parse(s);
  state.dashboards=o.dashboards; state.activeId=o.activeId; state.selected=null;
  const d=active(); if(d) applyAccent(d.accent);
  fullRender(); doSave();
}
function undo(){
  flushHist();
  if(!histPast.length){ toast('Tiada apa untuk buat asal'); return; }
  histFuture.push(histBase);
  histBase=histPast.pop();
  applySnap(histBase); updateUndoUI(); toast('Buat asal (undo)');
}
function redo(){
  clearTimeout(histTimer);
  if(snap()!==histBase){ flushHist(); }   // suntingan baharu membatalkan buat semula
  if(!histFuture.length){ toast('Tiada apa untuk buat semula'); return; }
  histPast.push(histBase);
  histBase=histFuture.pop();
  applySnap(histBase); updateUndoUI(); toast('Buat semula (redo)');
}
function updateUndoUI(){
  const u=document.getElementById('undoBtn'), r=document.getElementById('redoBtn');
  if(u) u.disabled=!histPast.length;
  if(r) r.disabled=!histFuture.length;
}

const state={ dashboards:[], activeId:null, mode:'edit', selected:null, printing:false, theme:'light' };

const maps={};
let imgTarget=null, csvTargetId=null;
function active(){ return state.dashboards.find(d=>d.id===state.activeId)||state.dashboards[0]; }
function widgets(){ const d=active(); return d?d.widgets:[]; }
function findW(id){ return widgets().find(w=>w.id===id); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ===================== Helpers ===================== */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isNum(v){ if(typeof v==='number') return true; if(v==null) return false; const s=String(v).replace(/[\s,]/g,'').replace(/^(RM|%|\$)/i,'').replace(/(%|j|k|jt)$/i,''); return s!=='' && !isNaN(Number(s)); }
/* huraikan nombor dari teks bercampur (cth "RM 1,280" -> 1280) */
function parseNum(v){ if(typeof v==='number') return v; if(v==null) return NaN; const s=String(v).replace(/[^0-9.\-]/g,''); return s===''?NaN:Number(s); }
/* ringkaskan nombor besar: 1,200,000 -> 1.2J */
function abbrNum(v){ const n=Number(v); if(!isFinite(n)) return v; const a=Math.abs(n), sgn=n<0?'-':'';
  if(a>=1e9) return sgn+(a/1e9).toFixed(a>=1e10?0:1).replace(/\.0$/,'')+'B';
  if(a>=1e6) return sgn+(a/1e6).toFixed(a>=1e7?0:1).replace(/\.0$/,'')+'J';
  if(a>=1e3) return sgn+(a/1e3).toFixed(a>=1e4?0:1).replace(/\.0$/,'')+'K';
  return String(n); }
/* sparkline ringkas (SVG) */
function sparklineSVG(data,color,fill){
  const vals=(data||[]).map(Number).filter(isFinite); if(vals.length<2) return '';
  const W=100,H=30,mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;
  const pts=vals.map((v,i)=>[(i/(vals.length-1))*W, (H-3) - ((v-mn)/rng)*(H-6)]);
  const line=pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    (fill?'<polygon points="0,'+H+' '+line+' '+W+','+H+'" fill="'+color+'" opacity="0.13"/>':'')+
    '<polyline points="'+line+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'+
    '<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.6" fill="'+color+'" vector-effect="non-scaling-stroke"/></svg>';
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function closeMenus(){document.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open'));}

/* ===================== Layout math ===================== */
function cellW(){ const inner=document.getElementById('cvInner').clientWidth||900; return (inner-(COLS-1)*GAP)/COLS; }
function pxX(x){ return x*(cellW()+GAP); }
function pxY(y){ return y*(ROW+GAP); }
function pxW(w){ return w*cellW()+(w-1)*GAP; }
function pxH(h){ return h*ROW+(h-1)*GAP; }
function maxBottom(){ return widgets().reduce((m,w)=>Math.max(m,w.y+w.h),0); }
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function normalize(movedId){
  const ws=widgets();
  const moved=ws.find(w=>w.id===movedId);
  const order=[]; if(moved) order.push(moved);
  ws.filter(w=>w!==moved).sort((a,b)=> a.y-b.y || a.x-b.x).forEach(w=>order.push(w));
  const done=[];
  order.forEach(w=>{ if(w!==moved){ let y=w.y; while(done.some(p=>overlap(p,{...w,y}))) y++; w.y=y; } done.push(w); });
}

/* ===================== Render: canvas ===================== */
function renderCanvas(){
  const inner=document.getElementById('cvInner');
  Object.keys(charts).forEach(id=>{try{charts[id].destroy();}catch(e){} delete charts[id];});
  Object.keys(maps).forEach(id=>{try{maps[id].remove();}catch(e){} delete maps[id];});
  inner.innerHTML='';
  const ws=widgets();
  if(ws.length===0){
    inner.style.height='420px';
    inner.innerHTML=`<div class="empty"><div class="eic"><svg viewBox="0 0 24 24">${SVG.kpi}</svg></div><h2>Dashboard kosong</h2><p>Pilih widget dari panel kiri untuk mula membina. Tambah KPI, carta, jadual atau teks — kemudian seret dan ubah saiznya mengikut kehendak anda.</p><div class="keys"><span><b>Seret</b> tajuk untuk gerak</span><span><b>Sudut</b> untuk ubah saiz</span><span><b>Klik</b> untuk sunting</span></div></div>`;
    return;
  }
  const stacked = isNarrow() || state.printing;
  if(stacked){
    inner.style.height='auto';
    const ordered=[...ws].sort((a,b)=> a.y-b.y || a.x-b.x);
    ordered.forEach(w=>{
      const el=buildWidgetEl(w,true);
      el.style.position='static'; el.style.width='100%'; el.style.marginBottom=GAP+'px';
      const bh=['line','area','bar','donut'].includes(w.type)?Math.max(w.h*ROW,190):(w.type==='map'?Math.max(w.h*ROW,240):(w.type==='gauge'?Math.max(w.h*ROW,150):(w.type==='table'||w.type==='image'?Math.max(w.h*ROW,150):(w.type==='kpi'?Math.max(w.h*ROW,150):(w.type==='progress'?Math.max(w.h*ROW,118):'auto')))));
      if(bh!=='auto') el.style.height=(bh+46)+'px'; else el.style.height='auto';
      inner.appendChild(el);
      renderBody(w);
    });
  } else {
    inner.style.height=Math.max(maxBottom()*(ROW+GAP),120)+'px';
    ws.forEach(w=>{
      const el=buildWidgetEl(w,false);
      el.style.left=pxX(w.x)+'px'; el.style.top=pxY(w.y)+'px';
      el.style.width=pxW(w.w)+'px'; el.style.height=pxH(w.h)+'px';
      inner.appendChild(el);
      renderBody(w);
    });

function buildWidgetEl(w,stacked){

  const actions=`<span class="w-actions">${lockBtn}<button data-m="dupW" data-id="${w.id}" title="Gandakan"><svg viewBox="0 0 24 24">${ICONS.copy}</svg></button><button class="del" data-m="delW" data-id="${w.id}" title="Padam"><svg viewBox="0 0 24 24">${ICONS.trash}</svg></button></span>`;
  const resize=(stacked||state.mode==='preview'||w.locked)?'':'<div class="w-resize" data-m="resize" data-id="'+w.id+'"></div>';
  if(w.type==='text'){

  }

      selectWidget(w.id);

    });

}

/* ===================== Render widget bodies ===================== */
function bodyEl(id){ const el=document.querySelector(`.widget[data-id="${id}"] .w-body`); return el; }
function renderBody(w,hostOverride){
  const host=hostOverride||bodyEl(w.id); if(!host) return;
  if(charts[w.id]){try{charts[w.id].destroy();}catch(e){} delete charts[w.id];}
  if(maps[w.id]){try{maps[w.id].remove();}catch(e){} delete maps[w.id];}
  const c=w.config;
  if(w.type==='kpi'){
    const d=Number(c.delta)||0, up=d>0, down=d<0, good=(up&&c.goodUp)||(down&&!c.goodUp);
    const cls=d===0?'':(good?'up':'down');

      const gd=c.condGood===''||c.condGood==null?null:Number(c.condGood), bd=c.condBad===''||c.condBad==null?null:Number(c.condBad);
      if(gd!=null && nv>=gd) valStyle=' style="color:var(--good)"';
      else if(bd!=null && nv<=bd) valStyle=' style="color:var(--bad)"';
    }}
    const spark=(c.showSpark && (c.spark||[]).filter(x=>isFinite(Number(x))).length>=2)?'<div class="kpi-spark">'+sparklineSVG(c.spark,acc,c.sparkFill)+'</div>':'';

    return;
  }
  if(w.type==='progress'){
    const val=Number(c.value)||0, tgt=Number(c.target)||0, mx=Math.max(Number(c.max)||0, val, tgt)||1;
    const col=c.color||(getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#4355E0');
    const reached=tgt>0 && val>=tgt;
    const fillCol=reached?'var(--good)':col;
    const pct=tgt>0?Math.round(val/tgt*100):0;
    const fmt=(n)=>(c.prefix||'')+(c.abbr?abbrNum(n):Number(n).toLocaleString('en-MY'))+(c.suffix||'');
    const fw=Math.max(0,Math.min(100,val/mx*100)), tw=Math.max(0,Math.min(100,tgt/mx*100));
    host.innerHTML=`<div class="prog">
      <div class="prog-val">${esc(fmt(val))}${tgt>0?`<span class="prog-pct" style="color:${reached?'var(--good)':col}">${pct}%</span>`:''}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${fw}%;background:${fillCol}"></div>${c.showTarget&&tgt>0?`<div class="prog-tmark" style="left:${tw}%" title="Sasaran"></div>`:''}</div>
      <div class="prog-foot"><span>0</span>${tgt>0?`<span>Sasaran ${esc(fmt(tgt))}</span>`:''}<span>${esc(fmt(mx))}</span></div></div>`;
    return;
  }
  if(w.type==='gauge'){
    const v=Number(c.value)||0,mn=Number(c.min)||0,mx=Number(c.max)||100;
    const frac=Math.max(0,Math.min(1,(v-mn)/((mx-mn)||1)));
    const r=86,cx=110,cy=100,len=Math.PI*r;
    const acc=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#4355E0';
    host.innerHTML=`<div class="gauge-wrap"><svg viewBox="0 0 220 118"><path d="M${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="var(--line-2)" stroke-width="15" stroke-linecap="round"/><path d="M${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${acc}" stroke-width="15" stroke-linecap="round" stroke-dasharray="${(frac*len).toFixed(1)} ${len.toFixed(1)}"/></svg><div class="gauge-val">${esc(String(c.value))}<span class="gsuf">${esc(c.suffix||'')}</span></div>${c.label?`<div class="gauge-lab">${esc(c.label)}</div>`:''}<div class="gauge-ends"><span>${mn}</span><span>${mx}</span></div></div>`;
    return;
  }
  if(w.type==='table'){
    const cols=c.columns||[], rows=c.rows||[];
    // skala warna bersyarat per lajur angka

    if(c.heatCols){
      colStat=cols.map((_,ci)=>{ const nums=rows.map(r=>parseNum(r[ci])).filter(isFinite); if(nums.length<2) return null; return {mn:Math.min(...nums),mx:Math.max(...nums)}; });
    }

    host.innerHTML=`<div class="wtable-scroll"><table class="wtable ${c.acc?'acc':''} ${c.striped?'striped':''}"><thead><tr>${cols.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map((_,i)=>{const cell=r[i]==null?'':r[i]; const num=isNum(cell); let st=''; if(colStat&&colStat[i]){ const nv=parseNum(cell); if(isFinite(nv)){ const t=(colStat[i].mx===colStat[i].mn)?0.5:(nv-colStat[i].mn)/(colStat[i].mx-colStat[i].mn); st=' style="background:'+hexA(acc,0.05+t*0.28)+'"'; } } return `<td class="${num?'num':''}"${st}>${esc(cell)}</td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;
    return;
  }
  if(w.type==='text'){
    host.innerHTML=`<div class="wtext sz-${c.size||'h'} al-${c.align||'left'}">${(c.heading||c.icon)?`<div class="th-row">${c.icon?`<img class="ticon" src="${c.icon}" alt="">`:''}${c.heading?`<div class="th">${esc(c.heading)}</div>`:''}</div>`:''}${c.body?`<div class="tb">${esc(c.body)}</div>`:''}</div>`;
    return;
  }
  if(w.type==='image'){
    if(!c.src){
      host.innerHTML=`<div class="img-empty"><svg viewBox="0 0 24 24">${SVG.image}</svg><span class="ih">Tiada imej lagi</span><span class="is">Klik widget ini, kemudian muat naik gambar atau ikon di panel kanan.</span></div>`;
    } else {
      host.innerHTML=`<div class="img-host ${c.caption?'has-cap':''}"><img src="${c.src}" alt="${esc(c.alt||'')}" style="object-fit:${c.fit==='cover'?'cover':'contain'}"></div>${c.caption?`<div class="img-cap">${esc(c.caption)}</div>`:''}`;
    }
    return;
  }
  if(w.type==='map'){ renderMap(w,host); return; }
  // charts
  if(typeof Chart==='undefined'){ host.innerHTML=`<div style="height:100%;display:grid;place-items:center;color:var(--ink-4);font-size:12px;text-align:center">Memuatkan pustaka carta…</div>`; return; }
  host.innerHTML=`<div class="chart-host"><canvas></canvas></div>`;
  const ctx=host.querySelector('canvas').getContext('2d');
  charts[w.id]=makeChart(ctx,w);
}
/* ----- web map (Leaflet) ----- */
function validPt(p){ return p && p.lat!=='' && p.lat!=null && p.lng!=='' && p.lng!=null && isFinite(Number(p.lat)) && isFinite(Number(p.lng)); }
function renderMap(w,host){
  const c=w.config;
  const pts=(c.points||[]).filter(validPt);
  if(typeof L==='undefined'){
    host.innerHTML=`<div class="map-empty"><svg viewBox="0 0 24 24">${SVG.map}</svg><span class="mh">Memuatkan peta…</span></div>`;

    host.innerHTML=`<div class="map-empty"><svg viewBox="0 0 24 24">${SVG.map}</svg><span class="mh">Tiada titik lokasi</span><span class="ms">Klik widget ini, kemudian tambah titik (label, lat, lng, nilai) atau import CSV di panel kanan.</span></div>`;
    return;
  }
  host.innerHTML=`<div class="map-host"></div>`;
  const el=host.querySelector('.map-host');
  const acc=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#4355E0';
  const tiles={
    light:{u:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',a:'&copy; OpenStreetMap, &copy; CARTO',sub:'abcd'},
    streets:{u:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',a:'&copy; OpenStreetMap',sub:'abc'},
    voyager:{u:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',a:'&copy; OpenStreetMap, &copy; CARTO',sub:'abcd'},
    satellite:{u:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',a:'Tiles &copy; Esri',sub:'abc'},
    dark:{u:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',a:'&copy; OpenStreetMap, &copy; CARTO',sub:'abcd'}
  };
  const tl=tiles[c.basemap]||tiles.light;
  const map=L.map(el,{zoomControl:true,attributionControl:true,scrollWheelZoom:false});
  L.tileLayer(tl.u,{subdomains:tl.sub,attribution:tl.a,maxZoom:19,crossOrigin:true}).addTo(map);

  const raw=pts.map(p=>Number(p.value)||0);
  const absMax=Math.max(1,...raw.map(Math.abs));
  const vMin=Math.min(...raw), vMax=Math.max(...raw);
  const scaleCol=(val,fallback)=>{ if(!c.colorScale) return fallback; const t=(vMax===vMin)?0.5:(val-vMin)/(vMax-vMin); return lerpColor(c.scaleFrom||'#DBE4FF', c.scaleTo||acc, t); };
  const fmtVal=(val)=>(c.pre||'')+(Math.abs(val)>=1000?val.toLocaleString('en-MY'):val)+(c.suf||'');
  const group=[];

  // garis sambungan (di belakang penanda)
  if(c.connect==='sequence' && pts.length>1){
    L.polyline(pts.map(p=>[Number(p.lat),Number(p.lng)]),{color:acc,weight:2.5,opacity:.55,dashArray:'6 8'}).addTo(map);
  } else if(c.connect==='hub' && pts.length>1){
    const hub=[Number(pts[0].lat),Number(pts[0].lng)];
    pts.slice(1).forEach(p=>L.polyline([hub,[Number(p.lat),Number(p.lng)]],{color:acc,weight:2,opacity:.5}).addTo(map));
  }

  let mode=c.mode||'bubble';
  if(mode==='heat' && typeof L.heatLayer!=='function'){ toast('Pustaka peta haba belum sedia — tunjuk buih'); mode='bubble'; }

  if(mode==='heat'){
    const hp=pts.map(p=>[Number(p.lat),Number(p.lng), Math.max(.15,(Math.abs(Number(p.value)||0))/absMax)]);
    L.heatLayer(hp,{radius:34,blur:24,minOpacity:.35,gradient:{0.2:'#2b6cff',0.45:'#23c3a8',0.7:'#f7b500',1:'#e8590c'}}).addTo(map);
    pts.forEach(p=>group.push([Number(p.lat),Number(p.lng)]));
  } else {
    pts.forEach(p=>{
      const lat=Number(p.lat),lng=Number(p.lng),val=Number(p.value)||0;
      const col=scaleCol(val, p.color||acc);
      const valTxt=fmtVal(val);
      let mk;
      if(mode==='pin'){
        const icon=L.divIcon({className:'map-pin',html:`${c.pulse?`<span class="ppz" style="--pc:${col}"></span>`:''}<svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z" fill="${col}" stroke="#fff" stroke-width="1.6"/><circle cx="12" cy="9" r="2.6" fill="#fff"/></svg>`,iconSize:[26,26],iconAnchor:[13,24],popupAnchor:[0,-22]});
        mk=L.marker([lat,lng],{icon});
      } else {
        const r=Math.round(8+Math.sqrt(Math.abs(val)/absMax)*22);
        const inner=c.showValues?`<span class="mbv">${esc(valTxt)}</span>`:'';
        const html=`<div class="mbub${c.pulse?' pulse':''}" style="--mc:${col};width:${r*2}px;height:${r*2}px;margin-left:${-r}px;margin-top:${-r}px">${inner}</div>`;
        mk=L.marker([lat,lng],{icon:L.divIcon({className:'mbub-wrap',html,iconSize:[0,0]})});
      }
      mk.bindPopup(`<b>${esc(p.label||'Titik')}</b><br><span class="mv">${esc(valTxt)}</span>`);
      if(c.labels){ mk.bindTooltip(esc(p.label||''),{permanent:true,direction:'top',className:'map-tip',offset:[0,mode==='pin'?-24:-2]}); }
      else if(c.showValues && mode==='pin'){ mk.bindTooltip(esc(valTxt),{permanent:true,direction:'top',className:'map-vlab',offset:[0,-24]}); }
      mk.addTo(map); group.push([lat,lng]);
    });
  }

  // legenda
  if(c.legend){
    const lg=document.createElement('div'); lg.className='map-legend';
    if(mode==='heat'){
      lg.innerHTML=`<div class="lg-t">Ketumpatan</div><div class="lg-bar" style="background:linear-gradient(90deg,#2b6cff,#23c3a8,#f7b500,#e8590c)"></div><div class="lg-ends"><span>Rendah</span><span>Tinggi</span></div>`;
    } else if(c.colorScale){
      lg.innerHTML=`<div class="lg-t">Nilai</div><div class="lg-bar" style="background:linear-gradient(90deg,${c.scaleFrom||'#DBE4FF'},${c.scaleTo||acc})"></div><div class="lg-ends"><span>${esc(fmtVal(vMin))}</span><span>${esc(fmtVal(vMax))}</span></div>`;
    } else if(mode==='bubble'){
      lg.innerHTML=`<div class="lg-t">Saiz = nilai</div><div class="lg-sz"><span class="lg-dot" style="width:12px;height:12px"></span><span>${esc(fmtVal(vMin))}</span></div><div class="lg-sz"><span class="lg-dot" style="width:26px;height:26px"></span><span>${esc(fmtVal(vMax))}</span></div>`;
    } else {
      lg.innerHTML=`<div class="lg-t">Lokasi</div>`+pts.slice(0,6).map(p=>`<div class="lg-row"><span class="lg-c" style="background:${scaleCol(Number(p.value)||0,p.color||acc)}"></span>${esc(p.label||'Titik')}</div>`).join('');
    }
    el.appendChild(lg);
  }

  maps[w.id]=map;
  const fit=()=>{ if(group.length===1) map.setView(group[0],9); else if(group.length>1){ try{ map.fitBounds(group,{padding:[28,28],maxZoom:11}); }catch(e){} } };
  fit();
  setTimeout(()=>{ try{ map.invalidateSize(); fit(); }catch(e){} },60);
}
/* interpolasi warna hex untuk skala nilai */
function lerpColor(a,b,t){
  const pa=hx(a),pb=hx(b); if(!pa||!pb) return b;
  const r=Math.round(pa[0]+(pb[0]-pa[0])*t), g=Math.round(pa[1]+(pb[1]-pa[1])*t), bl=Math.round(pa[2]+(pb[2]-pa[2])*t);
  return '#'+[r,g,bl].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hx(h){ const m=/^#?([0-9a-f]{6})$/i.exec(String(h).trim()); if(!m) return null; const n=parseInt(m[1],16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
function fmtTick(c){ return (v)=>{ const n=c.abbr?abbrNum(v):((Math.abs(v)>=1000)? Number(v).toLocaleString('en-MY') : v); return (c.pre||'')+n+(c.suf||''); }; }
function makeChart(ctx,w){
  const c=w.config, type=w.type;
  const cGrid=cssVar('--line')||'#EEF0F4', cTick=cssVar('--ink-3')||'#9097A2', cLeg=cssVar('--ink-2')||'#5A626E', cPanel=cssVar('--panel')||'#fff';
  const grid={display:!!c.grid,color:cGrid,drawBorder:false};
  const baseTicks={color:cTick,font:{family:'Inter',size:11}};
  if(type==='donut'){
    const labels=c.slices.map(s=>s.label), data=c.slices.map(s=>Number(s.value)||0), colors=c.slices.map(s=>s.color);
    const total=data.reduce((a,b)=>a+b,0);
    // Legenda menyesuaikan saiz widget supaya cincin donut sentiasa penuh.
    // Pada widget kecil/pendek (cth 3×3) legenda disembunyikan; tooltip & jumlah tengah kekal.
    const tooSmall=(w.w<=4 && w.h<=3) || w.w<=2 || w.h<=2;
    const legPos=(w.w > w.h+1)?'right':'bottom';
    const showLeg=!!c.legend && !tooSmall;
    return new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderColor:cPanel,borderWidth:2,hoverOffset:6}]},options:{
      responsive:true,maintainAspectRatio:false,cutout:(c.cutout||62)+'%',layout:{padding:1},
      plugins:{legend:{display:showLeg,position:legPos,labels:{boxWidth:8,boxHeight:8,usePointStyle:true,font:{family:'Inter',size:legPos==='right'?11:10.5},color:cLeg,padding:legPos==='right'?9:7}},tooltip:tooltipCfg(c)}
    },plugins:c.total?[centerTextPlugin(total,c)]:[]});
  }
  const datasets=c.series.map(s=>({
    label:s.name, data:s.values.map(Number), borderColor:s.color,
    backgroundColor: type==='bar'? s.color : (c.fill? hexA(s.color,.16): s.color),
    fill: type!=='bar' ? !!c.fill : false,
    tension: c.smooth?0.4:0, borderWidth:2.2, pointRadius:type==='bar'?0:0, pointHoverRadius:5,
    pointBackgroundColor:s.color, borderRadius:type==='bar'?6:0, maxBarThickness:46, borderSkipped:false
  }));
  return new Chart(ctx,{type:type==='area'?'line':type,data:{labels:c.labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
    plugins:{legend:{display:!!c.legend,position:'top',align:'end',labels:{boxWidth:9,boxHeight:9,usePointStyle:true,font:{family:'Inter',size:11},color:cLeg,padding:8}},tooltip:tooltipCfg(c)},
    scales:{x:{grid:{display:false,drawBorder:false},ticks:baseTicks},y:{beginAtZero:true,grid,ticks:Object.assign({},baseTicks,{callback:fmtTick(c)}),border:{display:false},stacked:!!c.stacked},
      ...(c.stacked?{x:{grid:{display:false,drawBorder:false},ticks:baseTicks,stacked:true}}:{})}
  }});
}
function tooltipCfg(c){return{backgroundColor:'#161A20',padding:10,cornerRadius:8,titleFont:{family:'Manrope',size:12,weight:'700'},bodyFont:{family:'Inter',size:12},displayColors:true,boxPadding:4,callbacks:{label:(it)=>{const v=it.raw; const val=(c.abbr&&typeof v==='number')?abbrNum(v):((typeof v==='number'&&Math.abs(v)>=1000)?v.toLocaleString('en-MY'):v); return ' '+(it.dataset.label?it.dataset.label+': ':'')+(c.pre||'')+val+(c.suf||'');}}};}
function hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h.length===3?h.split('').map(x=>x+x).join(''):h,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function centerTextPlugin(total,c){return{id:'ct',afterDraw(ch){const{ctx,chartArea}=ch;if(!chartArea)return;const x=(chartArea.left+chartArea.right)/2,y=(chartArea.top+chartArea.bottom)/2;
  const dim=Math.min(chartArea.right-chartArea.left, chartArea.bottom-chartArea.top);
  const f1=Math.max(13,Math.min(36, dim*0.17)), f2=Math.max(8,Math.min(13, dim*0.058));
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=cssVar('--ink')||'#161A20';ctx.font='700 '+f1.toFixed(1)+'px Manrope, sans-serif';
  const t=(c.pre||'')+(c.abbr?abbrNum(total):(total>=1000?total.toLocaleString('en-MY'):total))+(c.suf||'');
  ctx.fillText(t,x,y-f1*0.22);ctx.fillStyle=cssVar('--ink-3')||'#9097A2';ctx.font='600 '+f2.toFixed(1)+'px Inter, sans-serif';ctx.fillText('JUMLAH',x,y+f1*0.62);ctx.restore();}};}

/* ===================== Drag & resize ===================== */
let drag=null;
function startDrag(e,w){
  if(e.button!==undefined && e.button!==0 && e.pointerType==='mouse') return;
  const el=document.querySelector(`.widget[data-id="${w.id}"]`);
  drag={w,el,sx:e.clientX,sy:e.clientY,ox:pxX(w.x),oy:pxY(w.y),cw:cellW()};
  el.classList.add('dragging');
  el.setPointerCapture(e.pointerId);
  showPlaceholder(w.x,w.y,w.w,w.h);
  el.addEventListener('pointermove',onDrag);
  el.addEventListener('pointerup',endDrag,{once:true});
  e.preventDefault();
}
function onDrag(e){
  if(!drag)return;
  const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  const nl=drag.ox+dx, nt=drag.oy+dy;
  drag.el.style.left=nl+'px'; drag.el.style.top=Math.max(0,nt)+'px';
  const gx=Math.max(0,Math.min(COLS-drag.w.w,Math.round(nl/(drag.cw+GAP))));
  const gy=Math.max(0,Math.round(nt/(ROW+GAP)));
  drag.tx=gx; drag.ty=gy;
  showPlaceholder(gx,gy,drag.w.w,drag.w.h);
}
function endDrag(){
  if(!drag)return;
  drag.el.classList.remove('dragging');
  if(drag.tx!=null){ drag.w.x=drag.tx; drag.w.y=drag.ty; normalize(drag.w.id); }
  hidePlaceholder(); const d=drag; drag=null;
  renderCanvas(); scheduleSave();
}
let rez=null;
function startResize(e,w){
  const el=document.querySelector(`.widget[data-id="${w.id}"]`);
  rez={w,el,sx:e.clientX,sy:e.clientY,ow:pxW(w.w),oh:pxH(w.h),cw:cellW()};
  el.classList.add('resizing');
  el.setPointerCapture(e.pointerId);
  showPlaceholder(w.x,w.y,w.w,w.h);
  el.addEventListener('pointermove',onResize);
  el.addEventListener('pointerup',endResize,{once:true});
  e.preventDefault(); e.stopPropagation();
}
function onResize(e){
  if(!rez)return;
  const nw=rez.ow+(e.clientX-rez.sx), nh=rez.oh+(e.clientY-rez.sy);
  const gw=Math.max(1,Math.min(COLS-rez.w.x,Math.round((nw+GAP)/(rez.cw+GAP))));
  const gh=Math.max(1,Math.round((nh+GAP)/(ROW+GAP)));
  rez.tw=gw; rez.th=gh;
  rez.el.style.width=pxW(gw)+'px'; rez.el.style.height=pxH(gh)+'px';
  showPlaceholder(rez.w.x,rez.w.y,gw,gh);
}
function endResize(){
  if(!rez)return;
  rez.el.classList.remove('resizing');
  if(rez.tw){ rez.w.w=rez.tw; rez.w.h=rez.th; normalize(rez.w.id); }
  hidePlaceholder(); rez=null;
  renderCanvas(); scheduleSave();
}
function showPlaceholder(x,y,w,h){
  let p=document.getElementById('ph');
  if(!p){p=document.createElement('div');p.id='ph';p.className='placeholder';document.getElementById('cvInner').appendChild(p);}
  p.style.left=pxX(x)+'px';p.style.top=pxY(y)+'px';p.style.width=pxW(w)+'px';p.style.height=pxH(h)+'px';
}
function hidePlaceholder(){const p=document.getElementById('ph');if(p)p.remove();}

/* ===================== Selection ===================== */
function selectWidget(id){
  state.selected=id;
  document.querySelectorAll('.widget').forEach(el=>el.classList.toggle('selected', el.dataset.id===id && state.mode==='edit'));

  if(isNarrow()) document.getElementById('app').classList.add('show-insp');

/* ===================== Inspector ===================== */
function renderInspector(){
  const ins=document.getElementById('inspector');
  const w=findW(state.selected);
  if(!w){
    ins.innerHTML=`<div class="insp-empty"><div class="ie"><svg viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg></div><p>Pilih widget pada kanvas untuk menyunting sifatnya di sini.</p></div>`;
    return;
  }
  const r=REG[w.type];
  let html=`<div class="insp-head"><span class="ih-ic"><svg viewBox="0 0 24 24">${SVG[w.type]}</svg></span><span><div class="ih-t">${r.name}</div><div class="ih-s">Sifat widget</div></span></div><div class="insp-body">`;
  // general
  html+=`<div class="grp"><div class="grp-t">Umum</div>`;
  if(w.type!=='text'){
    html+=fldText('Tajuk',`w_title`,w.title||'');
    const ta=w.titleAlign||'left';
    html+=`<div class="fld"><label>Jajaran tajuk</label><div class="chips"><button class="chip-btn ${ta==='left'?'on':''}" data-talign="left">Kiri</button><button class="chip-btn ${ta==='center'?'on':''}" data-talign="center">Tengah</button><button class="chip-btn ${ta==='right'?'on':''}" data-talign="right">Kanan</button></div></div>`;
  }
  html+=`<div class="fld"><label>Saiz (lebar × tinggi)</label><div class="row2"><div class="stepper"><button data-step="w" data-d="-1">−</button><span class="val" id="szW">${w.w}</span><button data-step="w" data-d="1">+</button></div><div class="stepper"><button data-step="h" data-d="-1">−</button><span class="val" id="szH">${w.h}</span><button data-step="h" data-d="1">+</button></div></div></div>`;
  html+=`</div>`;
  // type-specific
  html+=typeFields(w);
  // sumber data langsung (widget data sahaja)
  if(LIVE_TYPES.includes(w.type)) html+=liveSourceFields(w);
  // actions
  html+=`<div class="grp"><button class="dup-w-btn" data-m="dupW" data-id="${w.id}">Gandakan widget</button><button class="del-w-btn" data-m="delW" data-id="${w.id}">Padam widget</button></div>`;
  html+=`</div>`;
  ins.innerHTML=html;
  bindInspector(w);
}

/* ----- inspector bindings ----- */
function bindInspector(w){
  const ins=document.getElementById('inspector');
  const c=w.config;
  const reflectTitle=()=>{const t=document.querySelector(`.widget[data-id="${w.id}"] .w-title`);if(t)t.textContent=(w.type==='text'?'':(w.title||REG[w.type].name));};
  // general title
  ins.querySelectorAll('[data-f]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const f=inp.dataset.f;
      if(f==='w_title'){ w.title=inp.value; reflectTitle(); }
      else if(f.startsWith('c_')){ c[f.slice(2)]=inp.value; renderBody(w); reflectTitle(); }
      scheduleSave();
    });
  });
  // config flat inputs (data-cf)
  ins.querySelectorAll('[data-cf]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const k=inp.dataset.cf;
      c[k]= inp.type==='number' ? (inp.value===''?'':Number(inp.value)) : inp.value;
      renderBody(w); scheduleSave();
    });
  });
  // toggles
  ins.querySelectorAll('[data-tog]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k=btn.dataset.tog.trim();
      c[k]=!c[k]; btn.classList.toggle('on',c[k]); renderBody(w); scheduleSave();
    });
  });
  // chips
  ins.querySelectorAll('[data-chip]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const g=btn.dataset.chip;
      c[g]=btn.dataset.v;
      ins.querySelectorAll(`[data-chip="${g}"]`).forEach(b=>b.classList.toggle('on',b===btn));
      renderBody(w); reflectTitle(); scheduleSave();
    });
  });
  // jajaran tajuk widget (kiri/tengah/kanan)
  ins.querySelectorAll('[data-talign]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      w.titleAlign=btn.dataset.talign;
      ins.querySelectorAll('[data-talign]').forEach(b=>b.classList.toggle('on',b===btn));
      const t=document.querySelector(`.widget[data-id="${w.id}"] .w-title`); if(t) t.style.textAlign=w.titleAlign;
      scheduleSave();
    });
  });
  // sumber data langsung
  ins.querySelectorAll('[data-src]').forEach(inp=>inp.addEventListener('input',()=>{
    if(!c.source) c.source={url:'',fmt:'auto',refresh:0};
    const k=inp.dataset.src; c.source[k]= k==='refresh'?(Number(inp.value)||0):inp.value;
    if(k==='refresh') syncLiveTimers();
    scheduleSave();
  }));
  const sfb=ins.querySelector('[data-src-fetch]'); if(sfb) sfb.addEventListener('click',()=>{ if(!c.source) c.source={url:'',fmt:'auto',refresh:0}; if(!c.source.url){ toast('Masukkan URL dahulu'); return; } toast('Mengambil data…'); fetchSource(w,true); });
  const scb=ins.querySelector('[data-src-clear]'); if(scb) scb.addEventListener('click',()=>{ c.source={url:'',fmt:'auto',refresh:0}; syncLiveTimers(); renderInspector(); scheduleSave(); toast('Sumber diputuskan'); });
  // range (cutout)
  ins.querySelectorAll('[data-range]').forEach(rg=>{
    rg.addEventListener('input',()=>{ c[rg.dataset.range]=Number(rg.value); const l=document.getElementById('cutLbl'); if(l)l.textContent=rg.value+'%'; renderBody(w); scheduleSave(); });
  });
  // size steppers
  ins.querySelectorAll('[data-step]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const dim=btn.dataset.step, d=Number(btn.dataset.d);
      if(dim==='w') w.w=Math.max(1,Math.min(COLS,w.w+d));
      else w.h=Math.max(1,Math.min(20,w.h+d));
      normalize(w.id);
      document.getElementById('szW').textContent=w.w; document.getElementById('szH').textContent=w.h;
      renderCanvas(); selectWidget(w.id); scheduleSave();
    });
  });
  // image / icon upload controls
  ins.querySelectorAll('[data-imgup]').forEach(b=>b.addEventListener('click',()=>{ imgTarget={id:w.id,key:b.dataset.imgup,max:Number(b.dataset.max)||512}; document.getElementById('imgIn').click(); }));
  ins.querySelectorAll('[data-imgdel]').forEach(b=>b.addEventListener('click',()=>{ w.config[b.dataset.imgdel]=''; renderBody(w); renderInspector(); scheduleSave(); }));
  // config colour pickers (cth: gradient skala peta)

  const sp=ins.querySelector('[data-sparkin]'); if(sp) sp.addEventListener('input',()=>{ c.spark=sp.value.split(/[,\s]+/).map(x=>x.trim()).filter(x=>x!=='').map(Number).filter(x=>isFinite(x)); renderBody(w); scheduleSave(); });
  // data editors
  if(w.type==='donut') renderSliceEditor(w);
  if(w.type==='table') renderTableEditor(w);
  if(w.type==='map') renderMapEditor(w);
  if(['line','area','bar'].includes(w.type)) renderSeriesEditor(w);
