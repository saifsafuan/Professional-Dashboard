/* ----- CSV rows → map points ----- */
function csvToPoints(rows){
  if(!rows.length) return [];
  const head=rows[0].map(x=>String(x==null?'':x).trim().toLowerCase());
  const find=(...n)=>head.findIndex(h=>n.includes(h));
  let li=find('label','nama','name','lokasi','location','tempat'), ai=find('lat','latitude','lintang'), oi=find('lng','lon','long','longitude','bujur'), vi=find('value','nilai','val','jumlah','amount','data');
  let start;
  if(ai<0||oi<0){ li=0; ai=1; oi=2; vi=3; start=(isFinite(Number(rows[0][1]))&&isFinite(Number(rows[0][2])))?0:1; }
  else { start=1; }
  const out=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    const lat=Number(r[ai]), lng=Number(r[oi]);
    if(!isFinite(lat)||!isFinite(lng)||String(r[ai]).trim()===''||String(r[oi]).trim()==='') continue;
    let val=0; if(vi>=0 && r[vi]!=null && String(r[vi]).trim()!==''){ val=Number(String(r[vi]).replace(/[^0-9.\-]/g,''))||0; }
    out.push({label:String(r[li]!=null?r[li]:'').trim()||('Titik '+(out.length+1)), lat, lng, value:val, color:PALETTE[out.length%PALETTE.length]});
  }
  return out;
}

/* ===================== Sumber data langsung (CSV/JSON URL + auto-segar) ===================== */
const liveTimers={};
const LIVE_TYPES=['table','line','area','bar','donut','map'];
/* tukar JSON kepada baris 2D (header + data) */
function jsonToRows(data){
  let arr = Array.isArray(data) ? data : (data && Array.isArray(data.data) ? data.data : (data && Array.isArray(data.rows) ? data.rows : null));
  if(!arr){ if(data && typeof data==='object'){ return [['Kunci','Nilai'], ...Object.entries(data).map(([k,v])=>[k, (v&&typeof v==='object')?JSON.stringify(v):v])]; } return []; }
  if(!arr.length) return [];
  if(arr[0] && typeof arr[0]==='object' && !Array.isArray(arr[0])){
    const keys=[...new Set(arr.flatMap(o=>Object.keys(o||{})))];
    return [keys, ...arr.map(o=>keys.map(k=>{ const v=o?o[k]:''; return v!=null?((v&&typeof v==='object')?JSON.stringify(v):v):''; }))];
  }
  return arr.map(r=>Array.isArray(r)?r:[r]);
}
/* petakan baris 2D ke struktur data widget */
function applyRows(w, rows){
  rows=(rows||[]).filter(r=>r && r.length); if(!rows.length) return false;
  const c=w.config, t=w.type;
  if(t==='table'){
    const ncol=Math.max(...rows.map(r=>r.length));
    c.columns=rows[0].map((x,i)=>String(x).trim()||('Lajur '+(i+1)));
    while(c.columns.length<ncol) c.columns.push('Lajur '+(c.columns.length+1));
    c.rows=rows.slice(1).map(r=>{ const o=[]; for(let i=0;i<c.columns.length;i++) o.push(r[i]!=null?String(r[i]):''); return o; });
    return true;
  }
  if(t==='map'){ const pts=csvToPoints(rows); if(pts.length){ c.points=pts; return true; } return false; }
  if(t==='donut'){
    const start=isNum(rows[0] && rows[0][1])?0:1; const sl=[];
    for(let i=start;i<rows.length;i++){ const r=rows[i]; if(r[0]==null||String(r[0]).trim()==='') continue; sl.push({label:String(r[0]),value:parseNum(r[1])||0,color:(c.slices&&c.slices[sl.length]&&c.slices[sl.length].color)||PALETTE[sl.length%PALETTE.length]}); }
    if(sl.length){ c.slices=sl; return true; } return false;
  }
  if(t==='line'||t==='area'||t==='bar'){
    const header=rows[0], ncol=Math.max(...rows.map(r=>r.length));
    const names=[]; for(let i=1;i<ncol;i++) names.push(String(header[i]!=null?header[i]:('Siri '+i)));
    if(!names.length) return false;
    const labels=[], cols=names.map(()=>[]);
    for(let i=1;i<rows.length;i++){ const r=rows[i]; if(r[0]==null||String(r[0]).trim()==='') continue; labels.push(String(r[0])); names.forEach((_,si)=>cols[si].push(parseNum(r[si+1])||0)); }
    if(!labels.length) return false;
    c.labels=labels;
    c.series=names.map((nm,si)=>({name:nm,color:(c.series&&c.series[si]&&c.series[si].color)||PALETTE[si%PALETTE.length],values:cols[si]}));
    return true;
  }
  return false;
}
async function fetchSource(w, manual){
  const s=w.config.source; if(!s||!s.url) { if(manual) toast('Masukkan URL dahulu'); return; }
  try{
    const res=await fetch(s.url,{cache:'no-store',redirect:'follow'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    const isJson = s.fmt==='json' || (s.fmt!=='csv' && /^\s*[\[{]/.test(text));
    let ok=false;
    if(isJson){ ok=applyRows(w, jsonToRows(JSON.parse(text))); }
    else { ok=applyRows(w, parseCSV(text)); }
    if(!ok) throw new Error('Data tidak serasi dengan widget ini');
    s.lastFetch=Date.now(); s.lastError='';
    renderBody(w); scheduleSave();
    if(state.selected===w.id) renderInspector();
    if(manual) toast('Data dikemas kini ✓');
  }catch(e){
    s.lastError=String((e&&e.message)||e);
    if(state.selected===w.id) renderInspector();
    if(manual) toast('Gagal: '+s.lastError);
    console.error('fetchSource',e);
  }
}
function syncLiveTimers(){
  Object.keys(liveTimers).forEach(id=>{ const w=findW(id); const s=w&&w.config.source; if(!w||!s||!s.url||!(Number(s.refresh)>0)){ clearInterval(liveTimers[id].t); delete liveTimers[id]; } });
  widgets().forEach(w=>{ const s=w.config&&w.config.source; if(s&&s.url&&Number(s.refresh)>0){
    const rf=Math.max(3,Number(s.refresh)), ex=liveTimers[w.id];
    if(ex && ex.rf===rf) return;            // tiada perubahan selang
    if(ex) clearInterval(ex.t);
    const isNew=!ex;
    liveTimers[w.id]={rf,t:setInterval(()=>{ if(findW(w.id)) fetchSource(w,false); }, rf*1000)};
    if(isNew) fetchSource(w,false);          // ambilan awal kali pertama sahaja
  }});
}

/* ----- CSV parser (handles quotes, embedded commas/newlines, delimiter detect) ----- */
function parseCSV(text){
  text=String(text).replace(/^\uFEFF/,'');
  const firstLine=(text.split(/\r?\n/,1)[0])||'';
  const counts={',':0,';':0,'\t':0}; let q=false;
  for(const ch of firstLine){ if(ch==='"') q=!q; else if(!q && counts.hasOwnProperty(ch)) counts[ch]++; }
  let delim=','; if(counts[';']>counts[','] && counts[';']>=counts['\t']) delim=';'; else if(counts['\t']>counts[','] && counts['\t']>counts[';']) delim='\t';
  const rows=[]; let row=[], field='', inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], nx=text[i+1];
    if(inQ){ if(ch==='"'){ if(nx==='"'){ field+='"'; i++; } else inQ=false; } else field+=ch; }
    else {
      if(ch==='"') inQ=true;
      else if(ch===delim){ row.push(field); field=''; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(ch==='\r'){ /* skip */ }
      else field+=ch;
    }
  }
  if(field!=='' || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>!(r.length===1 && r[0].trim()===''));
}
/* ----- image processing (resize raster, embed SVG) → data URL ----- */
function processImage(file, maxDim, cb){
  if(file.type==='image/svg+xml' || /\.svg$/i.test(file.name)){
    const rd=new FileReader(); rd.onload=()=>{ try{ cb('data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(rd.result)))); }catch(e){ cb(null); } }; rd.onerror=()=>cb(null); rd.readAsText(file); return;
  }
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
      const scale=Math.min(1,(maxDim||512)/Math.max(w,h));
      w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const keepAlpha = file.type==='image/png' || /\.png$/i.test(file.name) || file.type==='image/webp' || file.type==='image/gif';
      try{ cb(keepAlpha? cv.toDataURL('image/png') : cv.toDataURL('image/jpeg',0.85)); }catch(e){ cb(null); }
    };
    img.onerror=()=>cb(null);
    img.src=rd.result;
  };
  rd.onerror=()=>cb(null);
  rd.readAsDataURL(file);
}

    if(!dataUrl){ toast('Format imej tidak disokong'); return; }
    const w=findW(id); if(!w) return;
    w.config[key]=dataUrl;
    renderBody(w); renderInspector(); scheduleSave();
    if(dataUrl.length>2300000) toast('Imej dimuat naik (saiz besar — mungkin tidak kekal antara sesi)');
    else toast('Imej dimuat naik ✓');
  });
});
// re-render on resize (debounced)
let rzTimer=null;
window.addEventListener('resize',()=>{ clearTimeout(rzTimer); rzTimer=setTimeout(()=>{ renderCanvas(); },180); });
// print stacking
window.addEventListener('beforeprint',()=>{ state.printing=true; renderCanvas(); });
window.addEventListener('afterprint',()=>{ state.printing=false; renderCanvas(); });

/* ===================== Init ===================== */
function injectSaveInd(){
  const seg=document.getElementById('modeSeg');
  const s=document.createElement('span'); s.className='save-ind'; s.id='saveInd';
  s.innerHTML='<span class="pip"></span><span class="txt">Tersimpan</span>';
  seg.parentNode.insertBefore(s,seg);
}
async function init(){
  buildPalette();
  injectSaveInd();
  if(!persists){ document.getElementById('offbar').classList.add('show'); }
  const stored=await loadStore();
  if(stored && stored.dashboards && stored.dashboards.length){
    state.dashboards=stored.dashboards; state.activeId=stored.activeId||stored.dashboards[0].id;
    state.dashboards.forEach(d=>{ d.widgets=d.widgets||[]; d.accent=d.accent||ACCENTS[0].v; });
    if(stored.theme==='dark') state.theme='dark';
  } else {
    const t=TEMPLATES.sales;
    const ws=JSON.parse(JSON.stringify(t.widgets)).map(w=>({id:uid(),title:w.title||REG[w.type].name,...w}));
    state.dashboards=[{id:uid(),name:'Ringkasan Jualan',accent:t.color,widgets:ws,updatedAt:Date.now()}];
    state.activeId=state.dashboards[0].id;
  }
  applyTheme();
  setMode('edit');
  fullRender();
  histInit();
}
if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',init); } else { init(); }
</script>
